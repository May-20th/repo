<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XY's Repo</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #f2f2f7;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            max-width: 400px;
            width: 100%;
            background: white;
            border-radius: 32px;
            padding: 40px 24px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .slogan {
            color: #ff6b6b;
            font-size: 15px;
            font-weight: 500;
            margin-bottom: 12px;
            letter-spacing: 0.5px;
        }
        h1 {
            font-size: 32px;
            font-weight: 700;
            color: #007aff;
            margin-bottom: 8px;
        }
        .sub {
            color: #6c6c70;
            margin-bottom: 32px;
            font-size: 14px;
        }
        .btn {
            display: block;
            padding: 14px;
            margin: 16px 0;
            background: #007aff;
            color: white;
            font-size: 18px;
            font-weight: 600;
            border-radius: 30px;
            text-decoration: none;
            transition: background 0.2s;
        }
        .btn-zebra {
            background: #ff6b6b;
        }
        .btn:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="slogan">🍭 不要为了越狱而放弃升级的乐趣</div>
        <h1>XY's Repo</h1>
        <div class="sub">iOS 越狱插件源</div>
        
        <a class="btn" href="sileo://source/add?url=https://may-20th.github.io/repo/">
            添加到 Sileo
        </a>
        <a class="btn btn-zebra" href="zebra://sources/add?url=https://may-20th.github.io/repo/">
            添加到 Zebra
        </a>
    </div>
</body>
</html>
