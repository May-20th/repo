name: Fix Packages

on:
  workflow_dispatch:

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y dpkg-dev zstd
      - name: Generate Packages
        run: |
          dpkg-scanpackages --multiversion debs /dev/null > Packages.raw
          sed 's/^Section:.*/Section: Tweaks/' Packages.raw > Packages
          zstd -f Packages -o Packages.zst
          rm Packages.raw
      - name: Update Sections
        run: echo "Tweaks" > Sections
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          git add Packages Packages.zst Sections
          git commit -m "Restore correct Packages"
          git push
