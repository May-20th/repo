name: Update Repo Packages
on:
  push:
    paths:
      - 'debs/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev zstd

      - name: Generate Packages
        run: |
          dpkg-scanpackages --multiversion debs /dev/null > Packages.raw
          # 终极逻辑：先把所有 rootless 的踢去 RootHide，剩下的全部变其它
          sed -E \
            -e '/rootless|RootHide|RootHIDE/s/^Section:.*$/Section: RootHide/' \
            -e 's/^Section:.*$/Section: 其它/' \
            Packages.raw > Packages
          zstd -f Packages -o Packages.zst
          rm -f Packages.raw

      - name: Commit and push changes
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add Packages Packages.zst
          git commit -m "Auto: rootless -> RootHide, rest -> 其它" || echo "No changes"
          git push -f origin master
