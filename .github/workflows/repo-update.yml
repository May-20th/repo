name: Update Repo Packages
on:
  push:
    paths:
      - 'debs/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev zstd

      - name: Generate Packages
        run: |
          dpkg-scanpackages --multiversion debs /dev/null > Packages.raw
          # 逻辑：先匹配rootless，再统一改为Tweaks，优先级绝对正确
          sed -E \
            -e '/rootless|RootHide/s/^Section:.*$/Section: RootHide/' \
            -e 's/^Section:.*$/Section: Tweaks/' \
            Packages.raw > Packages
          zstd -f Packages -o Packages.zst
          rm -f Packages.raw

      - name: Commit and push changes
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add Packages Packages.zst
          git commit -m "Auto-update: Tweaks + RootHide" || echo "No changes"
          git push -f origin master
