name: Update Repo Packages
on:
  push:
    paths:
      - 'debs/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev zstd

      - name: Generate Packages
        run: |
          dpkg-scanpackages --multiversion debs /dev/null > Packages.raw
          # 【终极硬编码：先把所有带「破解」的，强制改成「破解」，再处理其他】
          sed -E -e '/破解/s/^Section:.*$/Section: 破解/' -e '/净化/s/^Section:.*$/Section: 净化/' -e 's/^Section:.*$/Section: 其它/' Packages.raw > Packages
          zstd -f Packages -o Packages.zst
          rm -f Packages.raw

      - name: Commit and push changes
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add Packages Packages.zst
          git commit -m "Auto-update hardcode fix" || echo "No changes"
          git push -f origin master
