name: Update Repo Packages

on:
  push:
    paths:
      - 'debs/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y dpkg-dev zstd
      - name: Generate Packages with correct format
        run: |
          dpkg-scanpackages --multiversion debs /dev/null > Packages.raw
          # 使用 awk 正确处理换行（RS="", ORS="\n\n" 确保段落间空行）
          awk 'BEGIN { RS=""; FS="\n"; ORS="\n\n" } {
            is_roothide=0;
            for(i=1;i<=NF;i++) if ($i ~ /^(Package|Filename):.*[Rr]oothide/) is_roothide=1;
            for(i=1;i<=NF;i++) {
              if ($i ~ /^Section:/) {
                if (is_roothide) $i = "Section: RootHide";
                else $i = "Section: Tweaks";
              }
            }
            print
          }' Packages.raw > Packages
          zstd -f Packages -o Packages.zst
          rm Packages.raw
      - name: Update Sections file
        run: printf "Tweaks\nRootHide\n" > Sections
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          git add Packages Packages.zst Sections
          git commit -m "Auto: Tweaks/RootHide with correct format" || echo "No changes"
          git push
