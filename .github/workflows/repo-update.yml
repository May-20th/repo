name: Update Repo Packages

on:
  push:
    paths:
      - 'debs/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev zstd

      # 确保 Sections 文件存在且内容为 Tweaks
      - name: Update Sections file
        run: echo "Tweaks" > Sections

      - name: Generate Packages
        run: |
          dpkg-scanpackages --multiversion debs /dev/null > Packages.raw
          # 删除所有已有的 Section 行，再统一添加一行 Section: Tweaks
          sed -i '/^Section:/d' Packages.raw
          echo "Section: Tweaks" >> Packages.raw
          # 对文件进行排序（保持整洁）
          sort -u Packages.raw > Packages
          zstd -f Packages -o Packages.zst
          rm -f Packages.raw

      - name: Commit and push changes
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add Packages Packages.zst Sections
          git commit -m "All to Tweaks" || echo "No changes"
          git push origin master
