name: Update Repo Packages
on:
  push:
    paths:
      - 'debs/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev zstd

      - name: Generate Packages
        run: |
          dpkg-scanpackages --multiversion debs /dev/null > Packages.raw
          
          # 1. 先分类净化/破解
          # 2. 强制把所有 rootless/RootHide 插件归到「其它」
          # 3. 兜底：所有没匹配到的，统一归到「其它」
          sed -E \
            -e '/净化|去广告|精简|无广告|NoAds|pure/s/^Section:.*$/Section: 净化/' \
            -e '/破解|解锁|SVIP|会员|VIP/s/^Section:.*$/Section: 破解/' \
            -e '/rootless|RootHide|RootHide Packages/s/^Section:.*$/Section: 其它/' \
            -e 's/^Section:.*$/Section: 其它/' \
            Packages.raw > Packages
          
          zstd -f Packages -o Packages.zst
          rm -f Packages.raw

      - name: Commit and push changes
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add Packages Packages.zst
          git commit -m "Auto-update with rootless fix" || echo "No changes to commit"
          git push -f origin master
